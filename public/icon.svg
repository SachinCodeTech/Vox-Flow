<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0b122e" />
      <stop offset="100%" stop-color="#03050c" />
    </radialGradient>
    
    <!-- Neon Cyan Glow -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Linear Cyan-to-Blue Gradient -->
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <!-- Solid rounded background square (ideal for icon masks) -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" stroke="#1e293b" stroke-width="4" />

  <!-- Outer ambient ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#neon-grad)" stroke-width="2" stroke-opacity="0.15" />

  <!-- Decorative technical marks -->
  <path d="M 256 30 L 256 50 M 256 462 L 256 482 M 30 256 L 50 256 M 462 256 L 482 256" stroke="#00f0ff" stroke-width="4" stroke-opacity="0.4" stroke-linecap="round" />

  <!-- Connecting Node Mesh (Representing workflows) -->
  <g filter="url(#neon-glow)">
    <!-- Circuit lines -->
    <path d="M 170 256 L 256 160 L 342 256 L 256 352 Z" fill="none" stroke="url(#neon-grad)" stroke-width="4" stroke-opacity="0.4" />
    <path d="M 120 256 L 392 256" fill="none" stroke="#00f0ff" stroke-width="2" stroke-opacity="0.3" stroke-dasharray="8 8" />

    <!-- Terminal Command Symbol '>' -->
    <path d="M 210 216 L 260 256 L 210 296" fill="none" stroke="#00f0ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />

    <!-- Core pulse block '_' -->
    <line x1="280" y1="296" x2="315" y2="296" stroke="#5da9ff" stroke-width="12" stroke-linecap="round" />

    <!-- Glowing Nodes at junctions -->
    <circle cx="170" cy="256" r="12" fill="#03050c" stroke="#00f0ff" stroke-width="6" />
    <circle cx="256" cy="160" r="12" fill="#03050c" stroke="#3b82f6" stroke-width="6" />
    <circle cx="342" cy="256" r="12" fill="#03050c" stroke="#00f0ff" stroke-width="6" />
    <circle cx="256" cy="352" r="12" fill="#03050c" stroke="#3b82f6" stroke-width="6" />
  </g>
</svg>
